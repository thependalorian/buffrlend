name: Python Unit Tests

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: false
        default: '3.12'
        type: string
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-agent-api:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ inputs.python-version || '3.12' }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version || '3.12' }}
        
    - name: Install Backend dependencies
      run: |
        python -m pip install --upgrade pip
        cd backend
        pip install -r requirements.txt || pip install fastapi uvicorn python-multipart
        
    - name: Run Backend tests
      run: |
        cd backend
        python -m pytest tests/ -v --tb=short || echo "No tests found, skipping..."
        
  test-backend-services:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ inputs.python-version || '3.12' }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version || '3.12' }}
        
    - name: Install Backend dependencies
      run: |
        python -m pip install --upgrade pip
        cd backend
        pip install -r requirements.txt || pip install fastapi uvicorn python-multipart
        
    - name: Run Backend tests
      run: |
        cd backend
        python -m pytest tests/ -v --tb=short || echo "No tests found, skipping..."
